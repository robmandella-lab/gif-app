<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Video → GIF</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Video→GIF">

  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --panel-2: #1f2330;
      --fg: #e7e9ee;
      --muted: #9aa0ad;
      --accent: #5b9dff;
      --accent-2: #3a7bff;
      --border: #2a2f3d;
      --ok: #3ecf8e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      line-height: 1.5;
      padding: 24px 16px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrap { width: 100%; max-width: 720px; }
    h1 { font-size: 22px; font-weight: 650; letter-spacing: -0.01em; }
    h1 span { color: var(--accent); }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }

    /* Drop zone */
    #drop {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    #drop.hover { border-color: var(--accent); background: var(--panel-2); color: var(--fg); }
    #drop strong { color: var(--fg); }
    #drop .big { font-size: 32px; margin-bottom: 6px; }

    video { width: 100%; border-radius: 10px; background:#000; display:block; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; margin-top: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; color: var(--muted); }
    .val { color: var(--fg); font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    select, input[type=number] {
      background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 14px; width: 100%;
    }

    .btn {
      appearance: none; border: none; cursor: pointer; font: inherit; font-weight: 600;
      background: var(--accent-2); color: #fff; border-radius: 10px;
      padding: 13px 18px; width: 100%; font-size: 15px; transition: opacity .15s, transform .05s;
    }
    .btn:hover { background: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); }

    .row { display: flex; gap: 10px; margin-top: 14px; }

    /* Progress */
    #progress { display: none; margin-top: 16px; }
    .bar { height: 8px; background: var(--panel-2); border-radius: 99px; overflow: hidden; }
    .bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .2s; }
    #status { font-size: 13px; color: var(--muted); margin-top: 8px; min-height: 18px; }

    /* Result */
    #result { display: none; }
    #result img { width: 100%; border-radius: 10px; background: #000; }
    .meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-top: 10px; }
    .meta b { color: var(--ok); font-weight: 600; }

    .hidden { display: none !important; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 14px; text-align:center; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Video <span>→</span> GIF</h1>
    <div class="sub">Runs entirely in your browser. Nothing is uploaded.</div>

    <!-- Step 1: pick a file -->
    <div class="card" id="pickCard">
      <div id="drop">
        <div class="big">🎬</div>
        <div><strong>Drop a video here</strong> or click to choose</div>
        <div style="font-size:12px;margin-top:6px">MP4, MOV, WebM, MKV …</div>
      </div>
      <input type="file" id="file" accept="video/*" class="hidden">
    </div>

    <!-- Step 2: trim + options -->
    <div class="card hidden" id="editCard">
      <video id="preview" controls playsinline></video>

      <div class="controls">
        <div class="field">
          <label>Start <span class="val" id="startLbl">0.0s</span></label>
          <input type="range" id="start" min="0" max="100" value="0" step="0.1">
        </div>
        <div class="field">
          <label>End <span class="val" id="endLbl">0.0s</span></label>
          <input type="range" id="end" min="0" max="100" value="100" step="0.1">
        </div>

        <div class="field">
          <label>Frame rate</label>
          <select id="fps">
            <option value="10">10 fps (smaller)</option>
            <option value="15" selected>15 fps</option>
            <option value="20">20 fps</option>
            <option value="24">24 fps (smooth)</option>
          </select>
        </div>
        <div class="field">
          <label>Width</label>
          <select id="width">
            <option value="320">320px (small)</option>
            <option value="480" selected>480px</option>
            <option value="640">640px (large)</option>
            <option value="0">Original</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button class="btn secondary" id="reset" style="flex:0 0 auto;width:auto;padding-left:16px;padding-right:16px">↺</button>
        <button class="btn" id="convert">Convert to GIF</button>
      </div>

      <div id="progress">
        <div class="bar"><i id="barFill"></i></div>
        <div id="status"></div>
      </div>
    </div>

    <!-- Step 3: result -->
    <div class="card hidden" id="resultCard">
      <div id="result">
        <img id="out" alt="GIF result">
        <div class="meta">
          <span>GIF · <span id="outDims"></span></span>
          <b id="outSize"></b>
        </div>
        <div class="row">
          <a class="btn" id="download" download="output.gif" style="text-align:center;text-decoration:none">Download GIF</a>
        </div>
      </div>
    </div>

    <div class="hint">First conversion downloads the ~31&nbsp;MB conversion engine (cached afterward).</div>
  </div>

  <!-- Vendored same-origin so the worker isn't blocked as cross-origin -->
  <script src="vendor/util.js"></script>
  <script src="vendor/ffmpeg.js"></script>
  <script>
  (() => {
    const { FFmpeg } = FFmpegWASM;
    const { fetchFile } = FFmpegUtil;

    // Big core comes from the CDN on demand (toBlobURL bypasses CORS).
    const CORE_BASE = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';

    let ffmpeg = null;
    let videoFile = null;
    let videoDuration = 0;

    const $ = id => document.getElementById(id);
    const pickCard = $('pickCard'), editCard = $('editCard'), resultCard = $('resultCard');
    const drop = $('drop'), fileInput = $('file'), preview = $('preview');
    const startEl = $('start'), endEl = $('end'), startLbl = $('startLbl'), endLbl = $('endLbl');
    const convertBtn = $('convert'), resetBtn = $('reset');
    const progress = $('progress'), barFill = $('barFill'), statusEl = $('status');
    const out = $('out'), outSize = $('outSize'), outDims = $('outDims'), downloadLink = $('download');

    // ---- File selection ----
    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('hover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
    drop.addEventListener('drop', e => {
      e.preventDefault(); drop.classList.remove('hover');
      if (e.dataTransfer.files[0]) loadVideo(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadVideo(fileInput.files[0]); });

    function loadVideo(f) {
      if (!f.type.startsWith('video/')) { alert('Please choose a video file.'); return; }
      videoFile = f;
      preview.src = URL.createObjectURL(f);
      preview.addEventListener('loadedmetadata', () => {
        videoDuration = preview.duration || 0;
        startEl.max = endEl.max = videoDuration.toFixed(2);
        startEl.value = 0; endEl.value = videoDuration.toFixed(2);
        updateLabels();
        pickCard.classList.add('hidden');
        editCard.classList.remove('hidden');
        resultCard.classList.add('hidden');
      }, { once: true });
    }

    // ---- Trim controls ----
    function updateLabels() {
      let s = parseFloat(startEl.value), e = parseFloat(endEl.value);
      if (s > e - 0.1) { s = Math.max(0, e - 0.1); startEl.value = s; }
      startLbl.textContent = s.toFixed(1) + 's';
      endLbl.textContent = e.toFixed(1) + 's';
    }
    startEl.addEventListener('input', () => { updateLabels(); preview.currentTime = parseFloat(startEl.value); });
    endEl.addEventListener('input', () => { updateLabels(); preview.currentTime = parseFloat(endEl.value); });

    resetBtn.addEventListener('click', () => {
      videoFile = null; preview.removeAttribute('src'); preview.load();
      editCard.classList.add('hidden'); resultCard.classList.add('hidden');
      pickCard.classList.remove('hidden'); fileInput.value = '';
    });

    // ---- Load ffmpeg engine lazily ----
    async function ensureFFmpeg() {
      if (ffmpeg) return ffmpeg;
      const { toBlobURL } = FFmpegUtil;
      ffmpeg = new FFmpeg();
      ffmpeg.on('progress', ({ progress: p }) => {
        if (p >= 0 && p <= 1) { barFill.style.width = (p * 100).toFixed(0) + '%'; }
      });
      setStatus('Downloading conversion engine…');
      await ffmpeg.load({
        coreURL: await toBlobURL(`${CORE_BASE}/ffmpeg-core.js`, 'text/javascript'),
        wasmURL: await toBlobURL(`${CORE_BASE}/ffmpeg-core.wasm`, 'application/wasm'),
      });
      return ffmpeg;
    }

    function setStatus(t) { statusEl.textContent = t; }

    // ---- Convert ----
    convertBtn.addEventListener('click', async () => {
      if (!videoFile) return;
      convertBtn.disabled = true; resetBtn.disabled = true;
      progress.style.display = 'block'; barFill.style.width = '0%';
      try {
        const ff = await ensureFFmpeg();

        const start = parseFloat(startEl.value);
        const end = parseFloat(endEl.value);
        const dur = Math.max(0.1, end - start);
        const fps = $('fps').value;
        const width = parseInt($('width').value, 10);

        const scale = width > 0 ? `scale=${width}:-1:flags=lanczos,` : '';
        // Single-pass palettegen+paletteuse for clean colors.
        const vf = `fps=${fps},${scale}split[s0][s1];[s0]palettegen=stats_mode=diff[p];[s1][p]paletteuse=dither=bayer:bayer_scale=3`;

        const inName = 'in' + (videoFile.name.match(/\.[a-z0-9]+$/i)?.[0] || '.mp4');
        setStatus('Reading video…');
        await ff.writeFile(inName, await fetchFile(videoFile));

        setStatus('Converting… (longer clips take a while)');
        await ff.exec([
          '-ss', start.toFixed(2),
          '-t', dur.toFixed(2),
          '-i', inName,
          '-vf', vf,
          '-loop', '0',
          'out.gif'
        ]);

        const data = await ff.readFile('out.gif');
        const blob = new Blob([data.buffer], { type: 'image/gif' });
        const url = URL.createObjectURL(blob);
        out.src = url; downloadLink.href = url;
        downloadLink.download = (videoFile.name.replace(/\.[^.]+$/, '') || 'output') + '.gif';
        outSize.textContent = (blob.size / 1024 / 1024).toFixed(2) + ' MB';
        out.onload = () => { outDims.textContent = out.naturalWidth + '×' + out.naturalHeight; };

        $('result').style.display = 'block';
        resultCard.classList.remove('hidden');
        setStatus('Done.');
        try { await ff.deleteFile(inName); await ff.deleteFile('out.gif'); } catch {}
      } catch (err) {
        console.error(err);
        setStatus('Error: ' + (err?.message || err));
      } finally {
        convertBtn.disabled = false; resetBtn.disabled = false;
      }
    });
  })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
    }
  </script>
</body>
</html>
